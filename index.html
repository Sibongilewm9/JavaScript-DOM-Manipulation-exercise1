<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic Spell Generator</title>
    <style>
      body {
        font-family: Georgia, "Times New Roman", Times, serif;
        background: #1a1a2e;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        min-height: 100vh;
      }
      h1 {
        color: #f1c40f;
        text-shadow: 0 0 10px #f39c12;
        margin-bottom: 20px;
      }
      #spellArea {
        width: 200px;
        min-height: 150px;
        border: 3px solid #8e44ad;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        padding: 20px;
        margin: 20px 0;
        background: #16213e;
        transition: background-color 0.5s ease;
        box-shadow: 0 0 20px rgba(142, 68, 173, 0.5);
      }
      button:hover {
        background: #9b59b6;
        transform: scale(1.05);
        box-shadow: 0 0 15px #8e44ad;
      }
      #ingredientsList {
        list-style: none;
        padding: 0;
        display: flex;
        gap: 15px;
        margin: 15px 0;
      }
      ingredientsList li {
        background: #0f3460;
        padding: 8px 15px;
        border-radius: 20px;
        border: 1px solid #e94560;
      }
      .ingredients-label {
        margin-top: 20px;
        color: #f1c40f;
      }
    </style>
  </head>
  <body>
    <h1>Welcome to the Magical Spell Generator</h1>
    <div id="spellArea">Your spell will appear here...</div>
    <button id="generateButton">Generate Spell</button>
    <button id="resetButton">Reset</button>

    <p class="ingredients-label">Available ingredients:</p>
    <ul id="ingredientList">
      <li>Dragon Scale</li>
      <li>Phoenix Feather</li>
      <li>Unicorn Horn</li>
    </ul>

    <script>
      const generateButton = document.getElementById("generateButton");
      const resetButton = document.getElementById("resetButton");
      const spellArea = document.getElementById("spellArea");
      const ingredientsList = document
        .getElementById("ingredientsList")
        .getElementsByTagName("li");
      const defaultText = "Your spell will appear here...";
      const defaultColor = "#16213e";

      generateButton.onclick = () => {
        generateButton.disabled = true;
        const selectedIngredient =
          ingredients[Math.floor(Math.random() * ingredients.length)]
            .textContent;
        spellArea.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 30%)`;
        let count = 3;
        spellArea.textContent = count;
        const timer = setInterval(() => {
          count--;
          if (count > 0) spellArea.textContent = count;
          else {
            clearInterval(timer);
            spellArea.textContent = `✨ Abracadabra! Your spell uses: ${selectedIngredient} ✨`;
            generateButton.disabled = false;
          }
        }, 1000);
      };

      resetButton.onclick = () => {
        spellArea.textContent = DEFAULT_TEXT;
        spellArea.style.backgroundColor = DEFAULT_COLOR;
        generateButton.disabled = false;
      };
    </script>
  </body>
</html>
